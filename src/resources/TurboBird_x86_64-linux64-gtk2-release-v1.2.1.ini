[FireBird]
InitialFBClientLib=

[UI]
Theme=Light
Language=eng
AllowIniOverrides=1

[Backup]
CloseDBBeforeBackup=1

[Restore]
DefaultPageSize=8192
DefaultNumBuffers=2048
RegisterDBAfterRestore=1
DefaultSegmentSize=64
DefaultSegmentUnit=MB

[Scripter]
EchoInput=1
StopOnFirstError=0
AutoDDL=1
IgnoreCreateDatabase=0
IgnoreGrants=0
ShowAffectedRows=1
ShowPerformanceStats=1

[ClipboardExport]
MaxExportRows=200

[MetaData]
AlwaysQuoteIdentifiers=1
CaseSensitiveObjectNames=1
ShowSystem=0

[IntelliSense]
ReloadCacheOnNodeExpand=0

[MetaDataTableExtract]
ExtractDomains=1
ExtractIndex=1
ExtractForeign=1
ExtractCheck=1
ExtractTrigger=1
ExtractGrant=1
ExtractData=1

[MainTreeView]
AlwaysRefresh=0
FontName=Arial
FontStyle=
FontSize=14
FontColor=clRed
AutoFilter=0

[QueryWindow]
AutoCommit=1
ExecMultiStatementsAsScript=1
ShowNavigator=1
BackgroundColor=clSilver
FontName=Courier New
FontSize=10
FontColor=clBlack
FontStyle=

[TransactionDefaults]
TxFileName=read_committed.txt

[BulkExport]
DefaultBatchSize=500000

[CSVEditor]
CSVDefaultFieldLength=50
CSVDelimiter=,
CSVQuoteChar="
CSVFirstLineAsFieldNames=1
CSVIgnoreOuterWhitespace=1
CSVQuoteOuterWhitespace=0

[UpdateChecker]
AutoSearchOnProgramStart=1
UnzipAfterDownload=1
RunNewVersionAfterUnzip=1
DeleteOldVersions=1

[Database]
NumBuffers=254
